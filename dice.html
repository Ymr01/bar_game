<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>摇骰子 · 酒吧游戏</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root { --bg:#0f0a1e; --neon:#ff2e7e; --neon2:#17e6d4; --gold:#ffd447; --text:#f4f0ff; }
  body {
    font-family:"PingFang SC","Microsoft YaHei",sans-serif;
    background:radial-gradient(circle at 20% 10%, #2a1150 0%, var(--bg) 55%);
    color:var(--text); min-height:100vh; display:flex; flex-direction:column;
    align-items:center; padding:20px 16px 40px;
  }
  .back { align-self:flex-start; color:var(--neon2); text-decoration:none; font-size:14px; margin-bottom:8px; }
  h1 {
    font-size:clamp(24px,6vw,38px); letter-spacing:2px; text-align:center;
    background:linear-gradient(90deg,var(--neon),var(--gold),var(--neon2));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .subtitle { opacity:.6; font-size:13px; margin-bottom:24px; letter-spacing:1px; }
  .dice-area { display:flex; gap:20px; margin:10px 0 30px; flex-wrap:wrap; justify-content:center; }
  .die {
    width:clamp(70px,20vw,96px); height:clamp(70px,20vw,96px);
    background:linear-gradient(145deg,#fff,#dcd6ec); border-radius:16px;
    box-shadow:0 8px 20px rgba(0,0,0,.4); position:relative;
    display:grid; grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(3,1fr);
    padding:14%;
  }
  .die.rolling { animation:shake .4s infinite; }
  @keyframes shake {
    0%,100%{transform:translateY(0) rotate(0);}
    25%{transform:translateY(-8px) rotate(-8deg);}
    75%{transform:translateY(-8px) rotate(8deg);}
  }
  .pip { width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
  .pip::after { content:""; width:70%; height:70%; border-radius:50%; background:#1a1030; }
  .pip.off::after { background:transparent; }

  .controls { display:flex; flex-direction:column; align-items:center; gap:18px; width:min(90vw,340px); }
  .count-row { display:flex; align-items:center; gap:14px; font-size:15px; }
  .count-row button {
    width:38px; height:38px; border-radius:10px; border:1px solid rgba(255,255,255,.2);
    background:rgba(0,0,0,.25); color:var(--text); font-size:22px; cursor:pointer;
  }
  .count-row button:active { filter:brightness(1.3); }
  .count-row #num { font-size:20px; font-weight:700; min-width:24px; text-align:center; }
  .roll-btn {
    width:100%; padding:16px; border-radius:14px; border:none;
    background:radial-gradient(circle at 30% 30%,#ff5c9d,var(--neon));
    color:#fff; font-size:19px; font-weight:800; letter-spacing:2px; cursor:pointer;
    box-shadow:0 6px 18px rgba(255,46,126,.4);
  }
  .roll-btn:active { transform:scale(.97); }
  .roll-btn:disabled { opacity:.6; }
  .total {
    margin-top:8px; font-size:16px; text-align:center; min-height:60px;
  }
  .total .big {
    font-size:clamp(34px,10vw,56px); font-weight:800;
    background:linear-gradient(90deg,var(--gold),var(--neon));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .total .tag { display:inline-block; margin-left:8px; padding:3px 12px; border-radius:20px; font-size:14px; vertical-align:middle; }
  .tag.big-t { background:rgba(255,92,157,.25); color:#ff8fb4; }
  .tag.small-t { background:rgba(23,230,212,.25); color:#5cf0e2; }
  .tag.leopard { background:rgba(255,212,71,.3); color:var(--gold); font-weight:700; }
  .rules { margin-top:26px; font-size:12.5px; opacity:.55; text-align:center; line-height:1.9; max-width:340px; }
</style>
</head>
<body>
  <a class="back" href="index.html">← 返回游戏厅</a>
  <h1>🎲 摇骰子</h1>
  <div class="subtitle">BAR GAME · 比大小 · 通杀喝酒</div>

  <div class="dice-area" id="diceArea"></div>

  <div class="controls">
    <div class="count-row">
      <span>骰子数量</span>
      <button id="minus">−</button>
      <span id="num">3</span>
      <button id="plus">+</button>
    </div>
    <button class="roll-btn" id="rollBtn">摇 骰 盅</button>
    <div class="total" id="total"></div>
  </div>

  <div class="rules">
    玩法：约定大小分界（默认 3 颗 ≥11 为“大”）。<br>
    三颗一样是“豹子”通杀，全场喝！点数小的先喝一杯 🍺
  </div>

<script>
  const PIP_LAYOUTS = {
    1:[4], 2:[0,8], 3:[0,4,8], 4:[0,2,6,8],
    5:[0,2,4,6,8], 6:[0,2,3,5,6,8]
  };
  let diceCount = 3;
  let rolling = false;

  const diceArea = document.getElementById("diceArea");
  const numEl = document.getElementById("num");
  const rollBtn = document.getElementById("rollBtn");
  const totalEl = document.getElementById("total");

  function makeDie(value) {
    const die = document.createElement("div");
    die.className = "die";
    const on = PIP_LAYOUTS[value] || [];
    for (let i = 0; i < 9; i++) {
      const pip = document.createElement("div");
      pip.className = "pip" + (on.includes(i) ? "" : " off");
      die.appendChild(pip);
    }
    return die;
  }

  function renderDice(values) {
    diceArea.innerHTML = "";
    values.forEach(v => diceArea.appendChild(makeDie(v)));
  }

  function updateCount() { numEl.textContent = diceCount; }

  document.getElementById("plus").onclick = () => { if (diceCount < 5 && !rolling) { diceCount++; updateCount(); reset(); } };
  document.getElementById("minus").onclick = () => { if (diceCount > 1 && !rolling) { diceCount--; updateCount(); reset(); } };

  function reset() {
    renderDice(Array(diceCount).fill(1));
    totalEl.innerHTML = "";
  }

  rollBtn.onclick = () => {
    if (rolling) return;
    rolling = true; rollBtn.disabled = true; totalEl.innerHTML = "";

    // 摇动动画
    renderDice(Array(diceCount).fill(1));
    document.querySelectorAll(".die").forEach(d => d.classList.add("rolling"));
    let ticks = 0;
    const spin = setInterval(() => {
      renderDice(Array.from({length:diceCount}, () => 1 + Math.floor(Math.random()*6)));
      document.querySelectorAll(".die").forEach(d => d.classList.add("rolling"));
      ticks++;
      if (ticks > 12) {
        clearInterval(spin);
        finish();
      }
    }, 80);
  };

  function finish() {
    const values = Array.from({length:diceCount}, () => 1 + Math.floor(Math.random()*6));
    renderDice(values);
    const sum = values.reduce((a,b)=>a+b,0);
    const allSame = values.every(v => v === values[0]);

    let tag = "";
    if (allSame && diceCount >= 3) {
      tag = '<span class="tag leopard">豹子·通杀！</span>';
    } else {
      const threshold = Math.ceil((diceCount * 7) / 2); // 大小分界
      if (sum >= threshold) tag = '<span class="tag big-t">大</span>';
      else tag = '<span class="tag small-t">小</span>';
    }
    totalEl.innerHTML = '点数 <span class="big">' + sum + '</span>' + tag;
    rolling = false; rollBtn.disabled = false;
  }

  updateCount();
  reset();
</script>
</body>
</html>
