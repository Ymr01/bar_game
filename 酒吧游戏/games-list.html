<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  h1 {
    font-size:clamp(24px,6vw,38px); letter-spacing:2px; text-align:center;
    background:linear-gradient(90deg,var(--neon),var(--gold),var(--neon2));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .subtitle { opacity:.6; font-size:13px; margin:4px 0 20px; letter-spacing:1px; text-align:center; }

  .toolbar { width:min(96vw,860px); display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-bottom:16px; }
  .random-btn {
    padding:14px 28px; border-radius:14px; border:none; cursor:pointer;
    font-size:17px; font-weight:800; letter-spacing:1px; color:#fff;
    background:linear-gradient(135deg,var(--purple),var(--neon));
    box-shadow:0 6px 20px rgba(255,46,126,.4);
  }
  .random-btn:active { transform:scale(.97); }
  .search {
    flex:1; min-width:160px; padding:13px 16px; border-radius:14px;
    border:1px solid rgba(255,255,255,.2); background:rgba(0,0,0,.25);
    color:var(--text); font-size:15px; outline:none;
  }
  .search:focus { border-color:var(--neon2); }

  .filters { width:min(96vw,860px); display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-bottom:18px; }
  .filters button {
    padding:7px 14px; border-radius:20px; border:1px solid rgba(255,255,255,.2);
    background:rgba(0,0,0,.2); color:var(--text); font-size:13px; cursor:pointer;
  }
  .filters button.active { background:var(--neon); border-color:var(--neon); font-weight:700; }

  .table-wrap { width:min(96vw,860px); background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.1); border-radius:16px; overflow:hidden; }
  table { width:100%; border-collapse:collapse; }
  thead th {
    background:rgba(124,92,255,.25); font-size:13px; padding:12px 10px; text-align:left;
    position:sticky; top:0; letter-spacing:1px;
  }
  tbody td { padding:12px 10px; border-top:1px solid rgba(255,255,255,.07); font-size:14px; vertical-align:top; }
  tbody tr:hover { background:rgba(255,255,255,.04); }
  .g-name { font-weight:700; white-space:nowrap; }
  .g-cat { display:inline-block; padding:2px 9px; border-radius:12px; font-size:11.5px; white-space:nowrap; }
  .cat-骰子 { background:rgba(255,212,71,.2); color:var(--gold); }
  .cat-扑克 { background:rgba(23,230,212,.2); color:var(--neon2); }
  .cat-反应 { background:rgba(124,92,255,.25); color:#b3a0ff; }
  .cat-惩罚 { background:rgba(255,46,126,.2); color:#ff8fb4; }
  .cat-团队 { background:rgba(60,232,138,.2); color:#7ff0aa; }
  .cat-创意 { background:rgba(255,143,60,.2); color:#ffb37a; }
  .g-desc { opacity:.8; line-height:1.5; }
  .play-link {
    display:inline-block; margin-top:6px; font-size:12px; color:#05201d;
    background:var(--neon2); padding:3px 10px; border-radius:10px; text-decoration:none; font-weight:700;
  }
  .empty { text-align:center; padding:30px; opacity:.5; }
  .count-note { width:min(96vw,860px); text-align:right; font-size:12px; opacity:.5; margin:8px 4px 0; }

  /* 随机弹窗 */
  .modal { position:fixed; inset:0; display:none; align-items:center; justify-content:center;
    background:rgba(0,0,0,.65); backdrop-filter:blur(4px); z-index:50; padding:20px; }
  .modal.show { display:flex; animation:fade .3s ease; }
  @keyframes fade { from{opacity:0;} to{opacity:1;} }
  .modal-card {
    background:linear-gradient(160deg,#2a1150,#150a2e); border:2px solid var(--gold);
    border-radius:22px; padding:30px 26px; text-align:center; max-width:380px; width:100%;
    box-shadow:0 0 50px rgba(255,212,71,.4); animation:pop .4s cubic-bezier(0.18,0.89,0.32,1.28);
  }
  @keyframes pop { from{transform:scale(.6);opacity:0;} to{transform:scale(1);opacity:1;} }
  .modal-card .label { font-size:13px; opacity:.7; letter-spacing:3px; }
  .modal-card .m-name { font-size:clamp(26px,8vw,40px); font-weight:800; margin:10px 0;
    background:linear-gradient(90deg,var(--gold),var(--neon)); -webkit-background-clip:text;
    background-clip:text; color:transparent; }
  .modal-card .m-cat { display:inline-block; margin-bottom:14px; }
  .modal-card .m-desc { font-size:15px; line-height:1.6; opacity:.85; margin-bottom:22px; }
  .modal-card .m-play { display:inline-block; margin-bottom:14px; color:#05201d; background:var(--neon2);
    padding:8px 18px; border-radius:12px; text-decoration:none; font-weight:700; font-size:14px; }
  .modal-btns { display:flex; gap:10px; }
  .modal-btns button { flex:1; padding:12px; border-radius:12px; border:none; cursor:pointer;
    font-size:15px; font-weight:700; }
  .m-again { background:var(--purple); color:#fff; }
  .m-close { background:transparent; border:1px solid rgba(255,255,255,.3)!important; color:var(--text); }
</style>

const CATS = ["全部","骰子","扑克","反应","惩罚","团队","创意"];
const $ = id => document.getElementById(id);
let curCat = "全部";
let curKw = "";

function playBtn(g, big) {
  if (!g.play) return "";
  const cls = big ? "m-play" : "play-link";
  return '<a class="'+cls+'" href="'+g.play+'">▶ 可直接玩</a>';
}

function filtered() {
  return GAMES.filter(g => {
    if (curCat !== "全部" && g.c !== curCat) return false;
    if (curKw && !(g.n + g.d).toLowerCase().includes(curKw)) return false;
    return true;
  });
}

function renderTable() {
  const list = filtered();
  const tb = $("tbody");
  if (list.length === 0) {
    tb.innerHTML = '<tr><td colspan="3" class="empty">没找到匹配的游戏，换个词试试～</td></tr>';
  } else {
    tb.innerHTML = list.map(g =>
      '<tr>'+
        '<td class="g-name">'+g.n+'</td>'+
        '<td><span class="g-cat cat-'+g.c+'">'+g.c+'</span></td>'+
        '<td class="g-desc">'+g.d+(g.play?'<br>'+playBtn(g,false):'')+'</td>'+
      '</tr>'
    ).join("");
  }
  $("countNote").textContent = "共 "+GAMES.length+" 个游戏，当前显示 "+list.length+" 个";
}

function renderFilters() {
  const box = $("filters"); box.innerHTML = "";
  CATS.forEach(c => {
    const b = document.createElement("button");
    b.textContent = c;
    if (c === curCat) b.classList.add("active");
    b.onclick = () => {
      curCat = c;
      box.querySelectorAll("button").forEach(x => x.classList.remove("active"));
      b.classList.add("active");
      renderTable();
    };
    box.appendChild(b);
  });
}

// 随机弹窗（从当前筛选结果里随机，没有则从全部里随机）
function rollRandom() {
  const pool = filtered().length ? filtered() : GAMES;
  const g = pool[Math.floor(Math.random() * pool.length)];
  $("mName").textContent = g.n;
  $("mCatWrap").innerHTML = '<span class="g-cat m-cat cat-'+g.c+'">'+g.c+'类</span>';
  $("mDesc").textContent = g.d;
  $("mPlayWrap").innerHTML = playBtn(g, true);
  $("modal").classList.add("show");
}

$("randomBtn").onclick = rollRandom;
$("mAgain").onclick = rollRandom;
$("mClose").onclick = () => $("modal").classList.remove("show");
$("modal").onclick = e => { if (e.target === $("modal")) $("modal").classList.remove("show"); };
$("search").addEventListener("input", e => { curKw = e.target.value.trim().toLowerCase(); renderTable(); });

renderFilters();
renderTable();
</script>
</body>
