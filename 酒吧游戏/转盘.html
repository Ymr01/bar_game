<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>幸运转盘 · 酒吧游戏</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0f0a1e;
    --panel: rgba(255,255,255,0.06);
    --neon: #ff2e7e;
    --neon2: #17e6d4;
    --gold: #ffd447;
    --text: #f4f0ff;
  }
  html, body { height: 100%; }
  body {
    font-family: "PingFang SC","Microsoft YaHei",-apple-system,sans-serif;
    background: radial-gradient(circle at 20% 10%, #2a1150 0%, var(--bg) 55%);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 40px;
    overflow-x: hidden;
  }
  h1 {
    font-size: clamp(24px, 6vw, 40px);
    letter-spacing: 2px;
    background: linear-gradient(90deg, var(--neon), var(--gold), var(--neon2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-align: center;
    margin-bottom: 4px;
  }
  .subtitle { opacity: 0.6; font-size: 13px; margin-bottom: 22px; letter-spacing: 1px; }
  .layout {
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
    justify-content: center;
    align-items: flex-start;
    width: 100%;
    max-width: 900px;
  }
  .wheel-wrap {
    position: relative;
    flex: 0 0 auto;
  }
  .wheel-outer {
    position: relative;
    width: min(78vw, 360px);
    height: min(78vw, 360px);
    border-radius: 50%;
    padding: 12px;
    background: linear-gradient(145deg, #ffd447, #ff2e7e, #17e6d4);
    box-shadow: 0 0 40px rgba(255,46,126,0.35), inset 0 0 20px rgba(0,0,0,0.4);
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: #1a1030;
    transition: transform 5s cubic-bezier(0.17, 0.67, 0.12, 0.99);
  }
  /* 指针 */
  .pointer {
    position: absolute;
    top: -6px; left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 18px solid transparent;
    border-right: 18px solid transparent;
    border-top: 34px solid var(--gold);
    filter: drop-shadow(0 3px 4px rgba(0,0,0,0.5));
    z-index: 5;
  }
  /* 中心开始按钮 */
  .spin-btn {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 92px; height: 92px;
    border-radius: 50%;
    border: 4px solid #fff;
    background: radial-gradient(circle at 30% 30%, #ff5c9d, var(--neon));
    color: #fff;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    box-shadow: 0 6px 18px rgba(0,0,0,0.45);
    z-index: 6;
    transition: transform .12s ease;
  }
  .spin-btn:active { transform: translate(-50%,-50%) scale(0.93); }
  .spin-btn:disabled { opacity: 0.55; cursor: not-allowed; }

  .panel {
    background: var(--panel);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 18px;
    padding: 20px;
    width: min(90vw, 300px);
    backdrop-filter: blur(8px);
  }
  .panel h2 { font-size: 16px; margin-bottom: 14px; opacity: 0.9; }
  .add-row { display: flex; gap: 8px; margin-bottom: 16px; }
  .add-row input {
    flex: 1;
    padding: 11px 12px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.18);
    background: rgba(0,0,0,0.25);
    color: var(--text);
    font-size: 15px;
    outline: none;
  }
  .add-row input:focus { border-color: var(--neon2); }
  .add-row button {
    padding: 0 16px;
    border-radius: 10px;
    border: none;
    background: var(--neon2);
    color: #05201d;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
  }
  .add-row button:active { filter: brightness(0.9); }

  .name-list { list-style: none; display: flex; flex-direction: column; gap: 8px; max-height: 320px; overflow-y: auto; }
  .name-list li {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: 10px;
    background: rgba(0,0,0,0.22);
    animation: pop .25s ease;
  }
  @keyframes pop { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .dot { width: 14px; height: 14px; border-radius: 50%; flex: 0 0 auto; }
  .name-list li span { flex: 1; font-size: 15px; word-break: break-all; }
  .del {
    border: none; background: transparent; color: #ff7a9c;
    font-size: 20px; cursor: pointer; line-height: 1; padding: 0 4px;
  }
  .del:hover { color: #ff2e7e; }
  .count-hint { font-size: 12px; opacity: 0.5; margin-top: 12px; text-align: center; }

  /* 结果弹窗 */
  .result {
    position: fixed; inset: 0;
    display: none;
    align-items: center; justify-content: center;
    background: rgba(0,0,0,0.6);
    z-index: 50;
    backdrop-filter: blur(3px);
  }
  .result.show { display: flex; animation: fade .3s ease; }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  .result-card {
    background: linear-gradient(160deg, #2a1150, #150a2e);
    border: 2px solid var(--gold);
    border-radius: 22px;
    padding: 34px 40px;
    text-align: center;
    box-shadow: 0 0 50px rgba(255,212,71,0.4);
    animation: popBig .4s cubic-bezier(0.18,0.89,0.32,1.28);
  }
  @keyframes popBig { from { transform: scale(0.5); opacity:0; } to { transform: scale(1); opacity:1; } }
  .result-card .label { font-size: 14px; opacity: 0.7; letter-spacing: 2px; }
  .result-card .winner {
    font-size: clamp(30px, 9vw, 52px);
    font-weight: 800;
    margin: 12px 0 24px;
    background: linear-gradient(90deg, var(--gold), var(--neon));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .result-card button {
    padding: 11px 30px;
    border-radius: 12px;
    border: none;
    background: var(--neon);
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
  }
  @media (max-width: 560px) {
    .layout { gap: 24px; }
  }
  .back { position:absolute; top:20px; left:18px; color:var(--neon2); text-decoration:none; font-size:14px; }
</style>
</head>
<body>
  <a class="back" href="index.html">← 返回游戏厅</a>
  <h1>🍸 幸运转盘</h1>
  <div class="subtitle">BAR GAME · 谁转到谁喝</div>

  <div class="layout">
    <div class="wheel-wrap">
      <div class="pointer"></div>
      <div class="wheel-outer">
        <canvas id="wheel" width="600" height="600"></canvas>
      </div>
      <button class="spin-btn" id="spinBtn">开始<br>转动</button>
    </div>

    <div class="panel">
      <h2>👥 参与的人</h2>
      <div class="add-row">
        <input id="nameInput" type="text" placeholder="输入名字，回车添加" maxlength="12">
        <button id="addBtn">添加</button>
      </div>
      <ul class="name-list" id="nameList"></ul>
      <div class="count-hint" id="countHint"></div>
    </div>
  </div>

  <div class="result" id="resultModal">
    <div class="result-card">
      <div class="label">🎉 恭喜中奖 🎉</div>
      <div class="winner" id="winnerName">—</div>
      <button id="closeResult">再来一局</button>
    </div>
  </div>

<script>
  // 每个扇区的配色
  const COLORS = [
    "#ff2e7e", "#17e6d4", "#ffd447", "#7c5cff",
    "#ff8f3c", "#3ce88a", "#ff5c9d", "#4db8ff",
    "#e94fd0", "#9be83c", "#ff6b6b", "#5ce1e6"
  ];

  let names = ["小明", "阿强", "莉莉"]; // 默认预置
  let rotation = 0;      // 当前累计旋转角度(度)
  let spinning = false;

  const canvas = document.getElementById("wheel");
  const ctx = canvas.getContext("2d");
  const SIZE = canvas.width;
  const R = SIZE / 2;

  const nameInput = document.getElementById("nameInput");
  const addBtn = document.getElementById("addBtn");
  const nameList = document.getElementById("nameList");
  const countHint = document.getElementById("countHint");
  const spinBtn = document.getElementById("spinBtn");
  const resultModal = document.getElementById("resultModal");
  const winnerName = document.getElementById("winnerName");
  const closeResult = document.getElementById("closeResult");

  function colorFor(i) { return COLORS[i % COLORS.length]; }

  // 画转盘
  function drawWheel() {
    ctx.clearRect(0, 0, SIZE, SIZE);
    const n = names.length;

    if (n === 0) {
      ctx.fillStyle = "#3a2a5c";
      ctx.beginPath(); ctx.arc(R, R, R - 4, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "rgba(255,255,255,0.5)";
      ctx.font = "bold 34px sans-serif";
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText("先添加名字", R, R);
      return;
    }

    const slice = (Math.PI * 2) / n;
    for (let i = 0; i < n; i++) {
      const start = i * slice - Math.PI / 2; // 从正上方开始
      const end = start + slice;
      // 扇形
      ctx.beginPath();
      ctx.moveTo(R, R);
      ctx.arc(R, R, R - 4, start, end);
      ctx.closePath();
      ctx.fillStyle = colorFor(i);
      ctx.fill();
      ctx.strokeStyle = "rgba(0,0,0,0.25)";
      ctx.lineWidth = 3;
      ctx.stroke();

      // 文字
      ctx.save();
      ctx.translate(R, R);
      ctx.rotate(start + slice / 2);
      ctx.textAlign = "right";
      ctx.textBaseline = "middle";
      ctx.fillStyle = "#1a1030";
      const fontSize = n > 8 ? 22 : 28;
      ctx.font = "bold " + fontSize + "px 'PingFang SC','Microsoft YaHei',sans-serif";
      let label = names[i];
      if (label.length > 6) label = label.slice(0, 6) + "…";
      ctx.fillText(label, R - 30, 0);
      ctx.restore();
    }

    // 中心小圆
    ctx.beginPath();
    ctx.arc(R, R, 60, 0, Math.PI * 2);
    ctx.fillStyle = "#1a1030";
    ctx.fill();
  }

  // 渲染名字列表
  function renderList() {
    nameList.innerHTML = "";
    names.forEach((name, i) => {
      const li = document.createElement("li");
      const dot = document.createElement("span");
      dot.className = "dot";
      dot.style.background = colorFor(i);
      const txt = document.createElement("span");
      txt.textContent = name;
      const del = document.createElement("button");
      del.className = "del";
      del.innerHTML = "&times;";
      del.title = "删除";
      del.onclick = () => { if (!spinning) { names.splice(i, 1); refresh(); } };
      li.appendChild(dot); li.appendChild(txt); li.appendChild(del);
      nameList.appendChild(li);
    });
    countHint.textContent = "当前 " + names.length + " 人" + (names.length < 2 ? " · 至少需要 2 人才能转" : "");
    spinBtn.disabled = names.length < 2 || spinning;
  }

  function refresh() { drawWheel(); renderList(); }

  // 添加名字
  function addName() {
    const v = nameInput.value.trim();
    if (!v) return;
    names.push(v);
    nameInput.value = "";
    nameInput.focus();
    refresh();
  }

  addBtn.onclick = addName;
  nameInput.addEventListener("keydown", e => { if (e.key === "Enter") addName(); });

  // 转动
  spinBtn.onclick = () => {
    if (spinning || names.length < 2) return;
    spinning = true;
    spinBtn.disabled = true;

    const n = names.length;
    const sliceDeg = 360 / n;
    const winner = Math.floor(Math.random() * n); // 随机选中者

    // 指针在正上方。扇区 i 的中心在初始角度 (i*slice + slice/2)，
    // 要让该中心转到正上方(指针处)，需要额外多转几圈。
    const targetCenter = winner * sliceDeg + sliceDeg / 2;
    const extraTurns = 5 * 360; // 至少转5圈
    // 让 winner 扇区中心停在指针(正上方=0°)：最终旋转 = 多圈 - 中心角
    const current = rotation % 360;
    let delta = extraTurns + (360 - targetCenter) - current;
    // 加一点随机抖动，避免每次都停在正中
    delta += (Math.random() - 0.5) * (sliceDeg * 0.6);
    rotation += delta;

    canvas.style.transform = "rotate(" + rotation + "deg)";

    setTimeout(() => {
      spinning = false;
      renderList();
      winnerName.textContent = names[winner];
      resultModal.classList.add("show");
    }, 5100);
  };

  closeResult.onclick = () => resultModal.classList.remove("show");
  resultModal.onclick = e => { if (e.target === resultModal) resultModal.classList.remove("show"); };

  // 初始化
  refresh();
</script>
</body>
</html>
