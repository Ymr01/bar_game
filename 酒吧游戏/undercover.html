<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>谁是卧底 · 酒吧游戏</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
  :root { --bg:#0f0a1e; --neon:#ff2e7e; --neon2:#17e6d4; --gold:#ffd447; --purple:#7c5cff; --text:#f4f0ff; }
  body {
    font-family:"PingFang SC","Microsoft YaHei",sans-serif;
    background:radial-gradient(circle at 20% 10%,#2a1150 0%,var(--bg) 55%);
    color:var(--text); min-height:100vh; display:flex; flex-direction:column;
    align-items:center; padding:20px 16px 40px;
  }
  .back { align-self:flex-start; color:var(--neon2); text-decoration:none; font-size:14px; margin-bottom:8px; }
  h1 {
    font-size:clamp(24px,6vw,38px); letter-spacing:2px; text-align:center;
    background:linear-gradient(90deg,var(--neon2),var(--purple),var(--neon));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .subtitle { opacity:.6; font-size:13px; margin-bottom:22px; letter-spacing:1px; text-align:center; }

  .screen { width:min(94vw,460px); display:none; }
  .screen.active { display:block; animation:fade .3s ease; }
  @keyframes fade { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }

  .panel { background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12);
    border-radius:18px; padding:20px; backdrop-filter:blur(8px); }
  .row { display:flex; align-items:center; justify-content:space-between; padding:13px 4px;
    border-bottom:1px solid rgba(255,255,255,.07); }
  .row:last-child { border-bottom:none; }
  .row .label { font-size:16px; }
  .row .label small { display:block; opacity:.5; font-size:11.5px; }
  .stepper { display:flex; align-items:center; gap:12px; }
  .stepper button { width:34px; height:34px; border-radius:9px; border:1px solid rgba(255,255,255,.2);
    background:rgba(0,0,0,.25); color:var(--text); font-size:20px; cursor:pointer; }
  .stepper button:active { filter:brightness(1.4); }
  .stepper .val { min-width:22px; text-align:center; font-size:18px; font-weight:700; }
  .toggle { width:52px; height:30px; border-radius:15px; border:none; cursor:pointer;
    background:rgba(255,255,255,.15); position:relative; transition:background .2s; }
  .toggle.on { background:var(--neon2); }
  .toggle::after { content:""; position:absolute; top:3px; left:3px; width:24px; height:24px;
    border-radius:50%; background:#fff; transition:left .2s; }
  .toggle.on::after { left:25px; }
  .total-line { text-align:center; margin:16px 0 4px; font-size:15px; }
  .total-line b { font-size:20px; color:var(--gold); }
  .total-line.warn { color:var(--neon); }
  .big-btn { width:100%; padding:16px; margin-top:16px; border-radius:14px; border:none;
    font-size:18px; font-weight:800; letter-spacing:2px; cursor:pointer; color:#fff;
    background:linear-gradient(135deg,var(--neon2),var(--purple)); box-shadow:0 6px 18px rgba(124,92,255,.4); }
  .big-btn:active { transform:scale(.98); }
  .big-btn:disabled { opacity:.5; }
  .hint { font-size:12px; opacity:.5; text-align:center; margin-top:10px; line-height:1.7; }

  /* 传阅卡片 */
  .pass-info { text-align:center; margin-bottom:18px; }
  .pass-info .who { font-size:clamp(22px,7vw,32px); font-weight:800; margin-bottom:6px; }
  .pass-info .prog { font-size:14px; opacity:.6; }
  .card-flip { perspective:1200px; width:100%; height:min(52vh,380px); cursor:pointer; }
  .card-inner { position:relative; width:100%; height:100%; transition:transform .5s; transform-style:preserve-3d; }
  .card-inner.revealed { transform:rotateY(180deg); }
  .card-face { position:absolute; inset:0; backface-visibility:hidden; border-radius:22px;
    display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; text-align:center; }
  .card-front { background:linear-gradient(160deg,#2a1150,#150a2e); border:2px solid var(--purple);
    box-shadow:0 0 30px rgba(124,92,255,.3); }
  .card-front .tap-ico { font-size:60px; margin-bottom:16px; }
  .card-front .tap-txt { font-size:18px; opacity:.85; }
  .card-front .tap-sub { font-size:13px; opacity:.5; margin-top:8px; }
  .card-back { background:linear-gradient(160deg,#1a1030,#2a1150); border:2px solid var(--gold);
    transform:rotateY(180deg); box-shadow:0 0 40px rgba(255,212,71,.25); }
  .card-back .my-label { font-size:14px; opacity:.6; letter-spacing:2px; margin-bottom:14px; }
  .card-back .my-word { font-size:clamp(34px,11vw,60px); font-weight:800; color:var(--gold);
    word-break:break-all; }
  .card-back .blank-tip { font-size:14px; opacity:.7; margin-top:16px; line-height:1.6; max-width:280px; }
  .next-btn { width:100%; padding:15px; margin-top:16px; border-radius:14px; border:none;
    font-size:17px; font-weight:700; cursor:pointer; color:#05201d; background:var(--neon2); visibility:hidden; }
  .next-btn.show { visibility:visible; animation:fade .3s ease; }
  .next-btn:active { filter:brightness(.9); }

  /* 结束/揭晓 */
  .reveal-panel { text-align:center; }
  .reveal-panel .r-title { font-size:18px; margin-bottom:16px; opacity:.85; }
  .word-pair { display:flex; gap:12px; margin-bottom:18px; }
  .word-box { flex:1; padding:18px 10px; border-radius:14px; }
  .word-box.civ { background:rgba(23,230,212,.12); border:1px solid var(--neon2); }
  .word-box.spy { background:rgba(255,46,126,.12); border:1px solid var(--neon); }
  .word-box .wb-label { font-size:12px; opacity:.6; margin-bottom:6px; }
  .word-box .wb-word { font-size:clamp(20px,6vw,28px); font-weight:800; }
  .word-box.civ .wb-word { color:var(--neon2); }
  .word-box.spy .wb-word { color:var(--neon); }
  .spy-list { font-size:15px; opacity:.85; margin-bottom:6px; line-height:1.8; }
  .spy-list b { color:var(--neon); }
  .secondary-btn { width:100%; padding:14px; margin-top:12px; border-radius:14px;
    border:1px solid rgba(255,255,255,.25); background:transparent; color:var(--text); font-size:15px; cursor:pointer; }
  .secondary-btn:active { filter:brightness(1.3); }
  .cat-pick { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin:14px 0 4px; }
  .cat-pick button { padding:7px 13px; border-radius:20px; border:1px solid rgba(255,255,255,.2);
    background:rgba(0,0,0,.2); color:var(--text); font-size:12.5px; cursor:pointer; }
  .cat-pick button.active { background:var(--neon2); color:#05201d; border-color:var(--neon2); font-weight:700; }
</style>
</head>
<body>
  <a class="back" href="index.html">← 返回游戏厅</a>
  <h1>🕵️ 谁是卧底</h1>
  <div class="subtitle">单机传阅 · 找出拿到不同词的卧底</div>

  <!-- 屏幕1：配置 -->
  <div class="screen active" id="setupScreen">
    <div class="panel">
      <div class="row">
        <div class="label">总人数<small>参与游戏的玩家数</small></div>
        <div class="stepper">
          <button data-t="players" data-d="-1">−</button>
          <span class="val" id="valPlayers">6</span>
          <button data-t="players" data-d="1">+</button>
        </div>
      </div>
      <div class="row">
        <div class="label">卧底人数<small>拿到卧底词的人</small></div>
        <div class="stepper">
          <button data-t="spies" data-d="-1">−</button>
          <span class="val" id="valSpies">1</span>
          <button data-t="spies" data-d="1">+</button>
        </div>
      </div>
      <div class="row">
        <div class="label">加入白板<small>随机1人无词，靠听描述蒙混</small></div>
        <button class="toggle" id="blankToggle"></button>
      </div>
    </div>

    <div class="cat-pick" id="catPick"></div>
    <div class="total-line" id="totalLine"></div>
    <button class="big-btn" id="startBtn">开始发词</button>
    <div class="hint">
      多数人拿到平民词，少数人拿到相近的卧底词。<br>
      轮流用一句话描述自己的词（不能直说），然后投票找卧底。
    </div>
  </div>

  <!-- 屏幕2：传阅 -->
  <div class="screen" id="passScreen">
    <div class="pass-info">
      <div class="who" id="passWho">第 1 位玩家</div>
      <div class="prog" id="passProg"></div>
    </div>
    <div class="card-flip" id="cardFlip">
      <div class="card-inner" id="cardInner">
        <div class="card-face card-front">
          <div class="tap-ico">👆</div>
          <div class="tap-txt">轻触卡片，查看你的词</div>
          <div class="tap-sub">确认周围没人偷看</div>
        </div>
        <div class="card-face card-back">
          <div class="my-label">你拿到的词是</div>
          <div class="my-word" id="myWord">—</div>
          <div class="blank-tip" id="blankTip"></div>
        </div>
      </div>
    </div>
    <button class="next-btn" id="nextBtn">我记住了，下一位 →</button>
  </div>

  <!-- 屏幕3：揭晓 -->
  <div class="screen" id="revealScreen">
    <div class="panel reveal-panel">
      <div class="r-title">👁 主持人揭晓（游戏结束再看）</div>
      <div class="word-pair">
        <div class="word-box civ"><div class="wb-label">平民词</div><div class="wb-word" id="civWord">—</div></div>
        <div class="word-box spy"><div class="wb-label">卧底词</div><div class="wb-word" id="spyWord">—</div></div>
      </div>
      <div class="spy-list" id="spyList"></div>
    </div>
    <button class="secondary-btn" id="againBtn">🔄 换一组词再来</button>
    <button class="secondary-btn" id="backToSetupBtn">⚙️ 返回修改配置</button>
  </div>

<script>
// PLACEHOLDER_SCRIPT
// 卧底词库：每对 [平民词, 卧底词]，两词相近容易混淆
const WORD_BANK = {
  "美食": [
    ["包子","饺子"],["馒头","花卷"],["拿铁","卡布奇诺"],["可乐","雪碧"],
    ["火锅","麻辣烫"],["米饭","米线"],["豆浆","牛奶"],["蛋糕","面包"],
    ["薯条","薯片"],["西瓜","哈密瓜"],["草莓","樱桃"],["酸奶","优酸乳"],
    ["油条","麻花"],["粽子","糯米饭"],["月饼","蛋黄酥"],["奶茶","果茶"],
    ["烧烤","铁板烧"],["泡面","乌冬面"],["汉堡","三明治"],["豆腐","豆干"],
    ["果冻","布丁"],["冰淇淋","雪糕"],["咖啡","美式"],["白酒","二锅头"]
  ],
  "生活": [
    ["牙刷","牙签"],["雨伞","阳伞"],["台灯","吊灯"],["沙发","床"],
    ["空调","风扇"],["镜子","放大镜"],["钱包","卡包"],["口红","唇膏"],
    ["拖鞋","凉鞋"],["眼镜","墨镜"],["水杯","保温杯"],["枕头","抱枕"],
    ["洗发水","沐浴露"],["纸巾","湿巾"],["钢笔","铅笔"],["书包","背包"],
    ["手表","手环"],["耳机","音响"],["充电宝","电池"],["剪刀","美工刀"]
  ],
  "人物": [
    ["医生","护士"],["老师","教授"],["警察","保安"],["演员","模特"],
    ["歌手","主持人"],["厨师","服务员"],["律师","法官"],["快递员","外卖员"],
    ["理发师","化妆师"],["司机","飞行员"],["记者","编辑"],["程序员","设计师"],
    ["网红","明星"],["老板","经理"],["士兵","将军"]
  ],
  "影视动漫": [
    ["孙悟空","猪八戒"],["蜘蛛侠","蝙蝠侠"],["超人","钢铁侠"],["哆啦A梦","大雄"],
    ["喜羊羊","灰太狼"],["白雪公主","灰姑娘"],["奥特曼","变形金刚"],["海绵宝宝","派大星"],
    ["葫芦娃","黑猫警长"],["皮卡丘","杰尼龟"],["柯南","毛利小五郎"],["樱桃小丸子","蜡笔小新"],
    ["黛玉","宝钗"],["武松","鲁智深"]
  ],
  "运动娱乐": [
    ["篮球","足球"],["乒乓球","羽毛球"],["游泳","跳水"],["瑜伽","普拉提"],
    ["跑步","竞走"],["滑雪","滑冰"],["台球","保龄球"],["象棋","围棋"],
    ["麻将","扑克"],["KTV","酒吧"],["电影院","剧院"],["蹦极","跳伞"],
    ["钓鱼","捕鱼"],["爬山","徒步"]
  ],
  "动物植物": [
    ["老虎","狮子"],["青蛙","蟾蜍"],["兔子","仓鼠"],["蝴蝶","蜜蜂"],
    ["鲨鱼","鲸鱼"],["乌龟","王八"],["孔雀","凤凰"],["熊猫","浣熊"],
    ["玫瑰","月季"],["柳树","杨树"],["仙人掌","芦荟"],["蘑菇","木耳"],
    ["麻雀","燕子"],["骆驼","羊驼"]
  ],
  "场景地点": [
    ["医院","药店"],["学校","幼儿园"],["超市","菜市场"],["机场","高铁站"],
    ["图书馆","书店"],["公园","广场"],["银行","邮局"],["餐厅","食堂"],
    ["酒店","民宿"],["电梯","扶梯"],["天桥","隧道"],["长城","故宫"]
  ]
};

const CATS = Object.keys(WORD_BANK);
const $ = id => document.getElementById(id);

let cfg = { players:6, spies:1, blank:false };
let curCat = "全部";
let deck = [];   // 每人一张：{word, role} role: civ|spy|blank
let idx = 0;
let curPair = null;

// 配置步进
document.querySelectorAll(".stepper button").forEach(b => {
  b.onclick = () => {
    const t = b.dataset.t, d = parseInt(b.dataset.d,10);
    if (t === "players") cfg.players = Math.max(3, Math.min(20, cfg.players + d));
    if (t === "spies")   cfg.spies   = Math.max(1, Math.min(6,  cfg.spies + d));
    syncCfg();
  };
});
$("blankToggle").onclick = function(){ cfg.blank = !cfg.blank; this.classList.toggle("on", cfg.blank); syncCfg(); };

function syncCfg() {
  $("valPlayers").textContent = cfg.players;
  $("valSpies").textContent = cfg.spies;
  // 卧底 + 白板 不能占满或超过总人数（至少留2个平民才有意义）
  const extras = cfg.spies + (cfg.blank ? 1 : 0);
  const civ = cfg.players - extras;
  const line = $("totalLine");
  line.innerHTML = "平民 <b>"+civ+"</b> · 卧底 <b>"+cfg.spies+"</b>" + (cfg.blank ? " · 白板 <b>1</b>" : "");
  const ok = civ >= 2;
  line.classList.toggle("warn", !ok);
  $("startBtn").disabled = !ok;
  if (!ok) line.innerHTML += "<br><small>平民至少要2人</small>";
}

// 分类选择
function renderCats() {
  const box = $("catPick"); box.innerHTML = "";
  ["全部",...CATS].forEach(c => {
    const b = document.createElement("button");
    b.textContent = c;
    if (c === curCat) b.classList.add("active");
    b.onclick = () => {
      curCat = c;
      box.querySelectorAll("button").forEach(x=>x.classList.remove("active"));
      b.classList.add("active");
    };
    box.appendChild(b);
  });
}

function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

function pickPair() {
  let pool;
  if (curCat === "全部") pool = CATS.reduce((acc,c)=>acc.concat(WORD_BANK[c]),[]);
  else pool = WORD_BANK[curCat];
  return pool[Math.floor(Math.random()*pool.length)];
}

function buildDeck() {
  curPair = pickPair();
  // 随机决定哪个词给平民、哪个给卧底
  const flip = Math.random() < 0.5;
  const civWord = flip ? curPair[0] : curPair[1];
  const spyWord = flip ? curPair[1] : curPair[0];
  curPair = { civ:civWord, spy:spyWord };

  const roles = [];
  const extras = cfg.spies + (cfg.blank ? 1 : 0);
  const civCount = cfg.players - extras;
  for (let i=0;i<civCount;i++) roles.push({word:civWord, role:"civ"});
  for (let i=0;i<cfg.spies;i++) roles.push({word:spyWord, role:"spy"});
  if (cfg.blank) roles.push({word:"（白板）", role:"blank"});
  return shuffle(roles);
}

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  $(id).classList.add("active");
}

let revealed = false;
function loadPlayer() {
  revealed = false;
  $("cardInner").classList.remove("revealed");
  $("nextBtn").classList.remove("show");
  $("passWho").textContent = "第 " + (idx+1) + " 位玩家";
  $("passProg").textContent = "共 " + deck.length + " 人 · 还剩 " + (deck.length - idx) + " 人未看";
  const card = deck[idx];
  $("myWord").textContent = card.word;
  $("blankTip").textContent = card.role === "blank"
    ? "你是白板，没有词！仔细听别人描述，伪装成拿到词的样子别被发现。"
    : "记住你的词，轮到你时用一句话描述它，但不能直接说出来。";
}

function flipCard() {
  if (revealed) return;
  revealed = true;
  $("cardInner").classList.add("revealed");
  setTimeout(()=>$("nextBtn").classList.add("show"), 450);
}

function nextPlayer() {
  $("cardInner").classList.remove("revealed");
  $("nextBtn").classList.remove("show");
  idx++;
  if (idx >= deck.length) setTimeout(showReveal, 300);
  else setTimeout(loadPlayer, 300);
}

function showReveal() {
  showScreen("revealScreen");
  $("civWord").textContent = curPair.civ;
  $("spyWord").textContent = curPair.spy;
  const spyPositions = deck.map((c,i)=>({c,i})).filter(x=>x.c.role==="spy").map(x=>"第"+(x.i+1)+"位");
  const blankPos = deck.map((c,i)=>({c,i})).filter(x=>x.c.role==="blank").map(x=>"第"+(x.i+1)+"位");
  let html = "卧底是：<b>" + spyPositions.join("、") + "</b>";
  if (blankPos.length) html += "<br>白板是：<b>" + blankPos.join("") + "</b>";
  $("spyList").innerHTML = html;
}

function start() {
  deck = buildDeck();
  idx = 0;
  showScreen("passScreen");
  loadPlayer();
}

$("startBtn").onclick = start;
$("cardFlip").onclick = flipCard;
$("nextBtn").onclick = nextPlayer;
$("againBtn").onclick = start;
$("backToSetupBtn").onclick = () => showScreen("setupScreen");

renderCats();
syncCfg();

</script>
</body>
</html>
