<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>狼人杀发牌 · 酒吧游戏</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
  :root { --bg:#0f0a1e; --neon:#ff2e7e; --neon2:#17e6d4; --gold:#ffd447; --purple:#7c5cff; --text:#f4f0ff; }
  body {
    font-family:"PingFang SC","Microsoft YaHei",sans-serif;
    background:radial-gradient(circle at 20% 10%,#2a1150 0%,var(--bg) 55%);
    color:var(--text); min-height:100vh; display:flex; flex-direction:column;
    align-items:center; padding:20px 16px 40px;
  }
  .back { align-self:flex-start; color:var(--neon2); text-decoration:none; font-size:14px; margin-bottom:8px; }
  h1 {
    font-size:clamp(24px,6vw,38px); letter-spacing:2px; text-align:center;
    background:linear-gradient(90deg,var(--purple),var(--neon),var(--gold));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .subtitle { opacity:.6; font-size:13px; margin-bottom:22px; letter-spacing:1px; text-align:center; }

  .screen { width:min(94vw,460px); display:none; }
  .screen.active { display:block; animation:fade .3s ease; }
  @keyframes fade { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }

  /* 配置区 */
  .panel { background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12);
    border-radius:18px; padding:20px; backdrop-filter:blur(8px); }
  .row { display:flex; align-items:center; justify-content:space-between; padding:12px 4px;
    border-bottom:1px solid rgba(255,255,255,.07); }
  .row:last-child { border-bottom:none; }
  .role-name { display:flex; align-items:center; gap:10px; font-size:16px; }
  .role-name .ico { font-size:22px; }
  .role-name small { display:block; opacity:.5; font-size:11.5px; font-weight:400; }
  .stepper { display:flex; align-items:center; gap:12px; }
  .stepper button { width:34px; height:34px; border-radius:9px; border:1px solid rgba(255,255,255,.2);
    background:rgba(0,0,0,.25); color:var(--text); font-size:20px; cursor:pointer; }
  .stepper button:active { filter:brightness(1.4); }
  .stepper .val { min-width:22px; text-align:center; font-size:18px; font-weight:700; }
  .total-line { text-align:center; margin:16px 0 4px; font-size:15px; }
  .total-line b { font-size:22px; color:var(--gold); }
  .total-line.warn b { color:var(--neon); }
  .presets { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin:14px 0 4px; }
  .presets button { padding:7px 12px; border-radius:20px; border:1px solid rgba(255,255,255,.2);
    background:rgba(0,0,0,.2); color:var(--text); font-size:12.5px; cursor:pointer; }
  .presets button:active { background:var(--purple); }
  .big-btn { width:100%; padding:16px; margin-top:16px; border-radius:14px; border:none;
    font-size:18px; font-weight:800; letter-spacing:2px; cursor:pointer; color:#fff;
    background:linear-gradient(135deg,var(--purple),var(--neon)); box-shadow:0 6px 18px rgba(124,92,255,.4); }
  .big-btn:active { transform:scale(.98); }
  .big-btn:disabled { opacity:.5; }
  .hint { font-size:12px; opacity:.5; text-align:center; margin-top:10px; line-height:1.7; }

  /* 传阅区 */
  .pass-info { text-align:center; margin-bottom:18px; }
  .pass-info .who { font-size:clamp(22px,7vw,32px); font-weight:800; margin-bottom:6px; }
  .pass-info .prog { font-size:14px; opacity:.6; }
  .card-flip { perspective:1200px; width:100%; height:min(58vh,420px); cursor:pointer; }
  .card-inner { position:relative; width:100%; height:100%; transition:transform .5s;
    transform-style:preserve-3d; }
  .card-inner.revealed { transform:rotateY(180deg); }
  .card-face { position:absolute; inset:0; backface-visibility:hidden; border-radius:22px;
    display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px;
    text-align:center; }
  .card-front { background:linear-gradient(160deg,#2a1150,#150a2e); border:2px solid var(--purple);
    box-shadow:0 0 30px rgba(124,92,255,.3); }
  .card-front .tap-ico { font-size:60px; margin-bottom:16px; }
  .card-front .tap-txt { font-size:18px; opacity:.85; }
  .card-front .tap-sub { font-size:13px; opacity:.5; margin-top:8px; }
  .card-back { background:linear-gradient(160deg,#1a1030,#2a1150); border:2px solid var(--gold);
    transform:rotateY(180deg); box-shadow:0 0 40px rgba(255,212,71,.3); }
  .card-back .role-ico { font-size:72px; margin-bottom:12px; }
  .card-back .role-title { font-size:clamp(30px,9vw,46px); font-weight:800; margin-bottom:10px; }
  .card-back .role-desc { font-size:14px; opacity:.75; line-height:1.6; max-width:300px; }
  .role-wolf .role-title { color:#ff6b6b; }
  .role-good .role-title { color:var(--neon2); }
  .role-god .role-title { color:var(--gold); }
  .next-btn { width:100%; padding:15px; margin-top:16px; border-radius:14px; border:none;
    font-size:17px; font-weight:700; cursor:pointer; color:#05201d; background:var(--neon2);
    visibility:hidden; }
  .next-btn.show { visibility:visible; animation:fade .3s ease; }
  .next-btn:active { filter:brightness(.9); }

  /* 上帝总览 */
  .god-list { list-style:none; }
  .god-list li { display:flex; align-items:center; gap:12px; padding:11px 8px;
    border-bottom:1px solid rgba(255,255,255,.07); font-size:16px; }
  .god-list .num { width:26px; height:26px; border-radius:50%; background:rgba(255,255,255,.1);
    display:flex; align-items:center; justify-content:center; font-size:13px; flex:0 0 auto; }
  .god-list .ico { font-size:22px; }
  .god-warn { text-align:center; font-size:13px; color:var(--gold); margin-bottom:14px; }
  .secondary-btn { width:100%; padding:14px; margin-top:12px; border-radius:14px;
    border:1px solid rgba(255,255,255,.25); background:transparent; color:var(--text);
    font-size:15px; cursor:pointer; }
  .secondary-btn:active { filter:brightness(1.3); }
</style>
</head>
<body>
  <a class="back" href="index.html">← 返回游戏厅</a>
  <h1>🐺 狼人杀发牌</h1>
  <div class="subtitle">单机传阅 · 一台手机轮流看身份</div>

  <!-- 屏幕1：配置 -->
  <div class="screen active" id="setupScreen">
    <div class="panel" id="roleRows"></div>
    <div class="presets" id="presets"></div>
    <div class="total-line" id="totalLine">共 <b>0</b> 个角色</div>
    <button class="big-btn" id="startBtn">开始发牌</button>
    <div class="hint">
      设好每种角色数量，点开始。手机将逐位显示身份，<br>
      每人看完点"下一位"再把手机传给下一个人。
    </div>
  </div>

  <!-- 屏幕2：传阅 -->
  <div class="screen" id="passScreen">
    <div class="pass-info">
      <div class="who" id="passWho">第 1 位玩家</div>
      <div class="prog" id="passProg"></div>
    </div>
    <div class="card-flip" id="cardFlip">
      <div class="card-inner" id="cardInner">
        <div class="card-face card-front">
          <div class="tap-ico">👆</div>
          <div class="tap-txt">轻触卡片，查看你的身份</div>
          <div class="tap-sub">确认周围没人偷看</div>
        </div>
        <div class="card-face card-back" id="cardBack">
          <div class="role-ico" id="backIco">🐺</div>
          <div class="role-title" id="backTitle">狼人</div>
          <div class="role-desc" id="backDesc"></div>
        </div>
      </div>
    </div>
    <button class="next-btn" id="nextBtn">我记住了，下一位 →</button>
  </div>

  <!-- 屏幕3：上帝总览 -->
  <div class="screen" id="godScreen">
    <div class="panel">
      <div class="god-warn">👁 仅上帝（主持人）查看，看完请勿外传</div>
      <ul class="god-list" id="godList"></ul>
    </div>
    <button class="secondary-btn" id="reshuffleBtn">🔄 重新洗牌发同一套</button>
    <button class="secondary-btn" id="backToSetupBtn">⚙️ 返回修改配置</button>
  </div>

<script>
// 角色定义
const ROLES = {
  wolf:    { name:"狼人",   ico:"🐺", cls:"role-wolf", desc:"每晚可与狼队友一起刀人。白天隐藏身份，混淆视听。", side:"狼" },
  villager:{ name:"平民",   ico:"👤", cls:"role-good", desc:"没有特殊技能。靠推理和投票找出狼人。", side:"好" },
  seer:    { name:"预言家", ico:"🔮", cls:"role-good", desc:"每晚可查验一名玩家的好坏身份。", side:"好" },
  witch:   { name:"女巫",   ico:"🧪", cls:"role-good", desc:"有一瓶解药和一瓶毒药，全程各一次。", side:"好" },
  hunter:  { name:"猎人",   ico:"🔫", cls:"role-good", desc:"死亡（被投票或被刀）时可开枪带走一人。", side:"好" },
  guard:   { name:"守卫",   ico:"🛡️", cls:"role-good", desc:"每晚守护一人免于被刀，不能连续两晚守同一人。", side:"好" },
  idiot:   { name:"白痴",   ico:"🤪", cls:"role-good", desc:"被投票出局时翻牌免死，但失去投票权。", side:"好" },
  wolfking:{ name:"狼王",   ico:"👑", cls:"role-wolf", desc:"狼阵营。死亡时可开枪带走一名玩家。", side:"狼" }
};

// 配置顺序 + 默认数量
const ORDER = ["wolf","villager","seer","witch","hunter","guard","idiot","wolfking"];
let counts = { wolf:2, villager:3, seer:1, witch:1, hunter:1, guard:0, idiot:0, wolfking:0 };

// 预设板子
const PRESETS = {
  "6人局": { wolf:2, villager:2, seer:1, witch:1, hunter:0, guard:0, idiot:0, wolfking:0 },
  "8人预女猎": { wolf:3, villager:3, seer:1, witch:1, hunter:1, guard:0, idiot:0, wolfking:0 },
  "9人标准": { wolf:3, villager:3, seer:1, witch:1, hunter:1, guard:0, idiot:0, wolfking:0 },
  "12人局": { wolf:4, villager:4, seer:1, witch:1, hunter:1, guard:1, idiot:0, wolfking:0 }
};

let deck = [];      // 洗好的牌
let idx = 0;        // 当前第几位

const $ = id => document.getElementById(id);

// 渲染配置行
function renderRows() {
  const box = $("roleRows"); box.innerHTML = "";
  ORDER.forEach(key => {
    const r = ROLES[key];
    const row = document.createElement("div");
    row.className = "row";
    row.innerHTML =
      '<div class="role-name"><span class="ico">'+r.ico+'</span>'+
      '<div>'+r.name+'<small>'+r.side+'阵营</small></div></div>'+
      '<div class="stepper">'+
        '<button data-k="'+key+'" data-d="-1">−</button>'+
        '<span class="val" id="val-'+key+'">'+counts[key]+'</span>'+
        '<button data-k="'+key+'" data-d="1">+</button>'+
      '</div>';
    box.appendChild(row);
  });
  box.querySelectorAll("button").forEach(b => {
    b.onclick = () => {
      const k = b.dataset.k, d = parseInt(b.dataset.d,10);
      counts[k] = Math.max(0, Math.min(9, counts[k] + d));
      $("val-"+k).textContent = counts[k];
      updateTotal();
    };
  });
}

function total() { return ORDER.reduce((s,k)=>s+counts[k],0); }

function updateTotal() {
  const t = total();
  const wolves = counts.wolf + counts.wolfking;
  const line = $("totalLine");
  line.innerHTML = "共 <b>"+t+"</b> 个角色（狼 "+wolves+" · 好人 "+(t-wolves)+"）";
  const ok = t >= 3 && wolves >= 1 && (t - wolves) >= 1;
  line.classList.toggle("warn", !ok);
  $("startBtn").disabled = !ok;
}

// 预设按钮
function renderPresets() {
  const box = $("presets"); box.innerHTML = "";
  Object.keys(PRESETS).forEach(name => {
    const b = document.createElement("button");
    b.textContent = name;
    b.onclick = () => { counts = {...PRESETS[name]}; renderRows(); updateTotal(); };
    box.appendChild(b);
  });
}

// 洗牌（Fisher-Yates）
function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildDeck() {
  const d = [];
  ORDER.forEach(k => { for (let i=0;i<counts[k];i++) d.push(k); });
  return shuffle(d);
}

// 屏幕切换
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  $(id).classList.add("active");
}

// 开始发牌
function startDeal() {
  deck = buildDeck();
  idx = 0;
  showScreen("passScreen");
  loadPlayer();
}

let revealed = false;
function loadPlayer() {
  revealed = false;
  $("cardInner").classList.remove("revealed");
  $("nextBtn").classList.remove("show");
  $("passWho").textContent = "第 " + (idx+1) + " 位玩家";
  $("passProg").textContent = "共 " + deck.length + " 人 · 还剩 " + (deck.length - idx) + " 人未看";
  // 预填背面（翻转后才可见，翻转过程有 0.5s 遮挡，不会被瞥见）
  const r = ROLES[deck[idx]];
  const back = $("cardBack");
  back.className = "card-face card-back " + r.cls;
  $("backIco").textContent = r.ico;
  $("backTitle").textContent = r.name;
  $("backDesc").textContent = r.desc;
}

function flipCard() {
  if (revealed) return;
  revealed = true;
  $("cardInner").classList.add("revealed");
  setTimeout(() => $("nextBtn").classList.add("show"), 450);
}

function nextPlayer() {
  // 先翻回正面，避免下一个人直接看到
  $("cardInner").classList.remove("revealed");
  $("nextBtn").classList.remove("show");
  idx++;
  if (idx >= deck.length) {
    setTimeout(showGod, 300);
  } else {
    setTimeout(loadPlayer, 300);
  }
}

// 上帝总览
function showGod() {
  showScreen("godScreen");
  const list = $("godList"); list.innerHTML = "";
  deck.forEach((k, i) => {
    const r = ROLES[k];
    const li = document.createElement("li");
    li.innerHTML = '<span class="num">'+(i+1)+'</span>'+
      '<span class="ico">'+r.ico+'</span>'+
      '<span>'+r.name+'</span>';
    list.appendChild(li);
  });
}

// 绑定
$("startBtn").onclick = startDeal;
$("cardFlip").onclick = flipCard;
$("nextBtn").onclick = nextPlayer;
$("reshuffleBtn").onclick = () => { deck = shuffle(buildDeck()); idx = 0; showScreen("passScreen"); loadPlayer(); };
$("backToSetupBtn").onclick = () => showScreen("setupScreen");

// 初始化
renderRows();
renderPresets();
updateTotal();
</script>
</body>
</html>
